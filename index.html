<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Math - Wikipedia Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Premium Math</h1>
            <p>Explore random Wikipedia articles or discover games</p>
        </header>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search Wikipedia or type 'games' for gaming assets..." />
            <button id="searchBtn">Search</button>
            <button id="randomBtn">Random Article</button>
        </div>

        <div id="articleContainer" class="article-container">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <!-- Games Popup Modal -->
    <div id="gamesModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2>🎮 Featured Games & Assets</h2>
            <div id="gamesList" class="games-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
